<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIMS Saveera | Login Choice</title>
    <meta name="theme-color" content="#ff6b35">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/icon-192x192.png') }}">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #eef4ff 0%, #ffffff 45%, #fff1e8 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #0b1f3a;
        }

        .choice-card {
            width: 100%;
            max-width: 430px;
            background: rgba(255, 255, 255, 0.96);
            border-radius: 24px;
            padding: 30px 24px;
            text-align: center;
            box-shadow: 0 20px 55px rgba(15, 35, 70, 0.16);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .logo {
            width: 170px;
            max-width: 75%;
            margin-bottom: 18px;
        }

        .title {
            font-size: 25px;
            font-weight: 800;
            margin: 4px 0 8px;
            color: #002b5c;
        }

        .subtitle {
            font-size: 14px;
            line-height: 1.6;
            color: #5c6f8c;
            margin: 0 0 24px;
        }

        .btn {
            display: block;
            width: 100%;
            text-decoration: none;
            border-radius: 15px;
            padding: 15px 16px;
            margin-top: 13px;
            font-weight: 800;
            font-size: 15px;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-mobile {
            background: linear-gradient(135deg, #ff8a3d, #ff5a2f);
            color: #ffffff;
            box-shadow: 0 12px 24px rgba(255, 100, 50, 0.26);
        }

        .btn-web {
            background: #002b5c;
            color: #ffffff;
            box-shadow: 0 12px 24px rgba(0, 43, 92, 0.20);
        }

        .note {
            margin-top: 20px;
            font-size: 12px;
            color: #6b7c93;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <main class="choice-card">
        <img class="logo"
             src="{{ url_for('static', filename='icons/Saveera-Hospital_logo-removebg-preview.png') }}"
             alt="KIMS Saveera Hospital"
             onerror="this.style.display='none'">

        <h1 class="title">KIMS Saveera</h1>
        <p class="subtitle">Select how you want to continue. Mobile App Login opens the PWA/mobile experience.</p>

        <a class="btn btn-mobile" href="{{ url_for('mobile.login') }}">Mobile App Login</a>
        <a class="btn btn-web" href="{{ url_for('auth.login') }}">Web Login</a>

        <p class="note">Tip: On mobile, open Mobile App Login and use Add to Home Screen to install the PWA.</p>
    </main>
</body>
</html>
