<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Offline • KIMS Saveera</title>
  <style>
    body{margin:0;font-family:Arial,sans-serif;background:#eef1f5;color:#1f2937;display:flex;min-height:100vh;align-items:center;justify-content:center;padding:20px}
    .card{max-width:460px;background:#fff;border-radius:18px;padding:28px;text-align:center;box-shadow:0 16px 40px rgba(15,23,42,.12)}
    .logo{width:150px;height:auto;margin:0 auto 16px;background:transparent;display:flex;align-items:center;justify-content:center}.logo img{max-width:150px;height:auto;display:block}
    h1{margin:0 0 10px;font-size:24px}.btn{display:inline-block;margin-top:16px;background:#ff6b35;color:#fff;padding:10px 18px;border-radius:10px;text-decoration:none;font-weight:700}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo"><img src="/static/icons/Saveera-Hospital_logo-removebg-preview.png" alt="Saveera Hospital"></div>
    <h1>You are offline</h1>
    <p>Please check internet/server connection and try again. Your KIMS Saveera mobile app will open again when internet is available.</p>
    <a class="btn" href="/m/login">Try Again</a>
  </div>
</body>
</html>
